services:
  frontend:
    image: node:20-alpine
    container_name: vthome_frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm install --include=dev && npm run build && npm run start"
    environment:
      - NODE_ENV=production  # <--- CAMBIA development POR production
      - NEXT_PUBLIC_API_URL=http://172.235.117.211/api
